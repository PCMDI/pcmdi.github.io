 


<style>

label
{
    font-weight: bold;
    margin-right: 5px;
}

</style>

<br>

<form name="publication_form" id="publication_form" action="#" method="post">



<input type="hidden" id="ipcc_publication_id" name="ipcc_publication_id" value="">
<input type="hidden" id="ipcc_subproject_id" name="ipcc_subproject_id" value="">

<table cellpadding="0" cellspacing="2" border="0">
    <tr>
        <td><label for="authors">Authors:</label></td>
        <td><input type="text" id="authors" name="authors" size="40" maxlength="255" value=""></td>
    </tr>

    <tr>
        <td>&nbsp;</td>
        <td>(e.g. "Johnson, L.E., and J.M. Smith")</td>
    </tr>


    <tr>
        <td><label for="title">Title:</label></td>
        <td><input type="text" id="title" name="title" size="80" maxlength="255" value=""></td>
    </tr>

    <tr>
        <td>&nbsp;</td>
        <td>(e.g. "Evaluation of precipitation in climate models")</td>
    </tr>


    <tr>
        <td valign="top"><label for="abstract">Abstract:</label></td>
        <td>
            <textarea id="abstract" name="abstract" rows="10" cols="80"></textarea>
            <br>
            (separate paragraphs with blank lines)
        </td>
    </tr>


    <tr>
        <td><label for="status">Status:</label></td>
        <td>
            <select id="status" name="status" size="1">
                <option value="">--- Select Status ---</option>
                <option value="published" >Published</option>
                <option value="in_press" >In Press</option>
                <option value="accepted" >Accepted</option>
                <option value="submitted" >Submitted</option>
                <option value="in_preparation" >In Preparation</option>
            </select>
        </td>
    </tr>

    <tr>
        <td colspan="2"><h3>If Known:</h3></td>
    </tr>

    
    <tr>
        <td><label for="journal">Journal:</label></td>
        <td><input type="text" id="journal" name="journal" size="40" maxlength="255" value=""></td>
    </tr>

    <tr>
        <td>&nbsp;</td>
        <td>(e.g. "J. Geophys. Res.")</td>
    </tr>

    <tr>
        <td><label for="year">Year:</label></td>
        <td><input type="text" id="year" name="year" size="6" maxlength="10" value=""></td>
    </tr>

    <tr>
        <td><label for="volume">Volume:</label></td>
        <td><input type="text" id="volume" name="volume" size="4" maxlength="10" value=""></td>
    </tr>

    <tr>
        <td><label for="pages">Pages:</label></td>
        <td><input type="text" id="pages" name="pages" size="10" maxlength="20" value=""></td>
    </tr>


    <tr>
        <td><label for="doi_id">DOI ID:</label></td>
        <td><input type="text" id="doi_id" name="doi_id" size="30" maxlength="255" value=""></td>
    </tr>

    <tr>
        <td>&nbsp;</td>
        <td>(e.g. "doi:10.1029/2005JD005776")</td>
    </tr>


    <tr>
        <td><label for="url">URL:</label></td>
        <td><input type="text" id="url" name="url" size="40" maxlength="255" value=""></td>
    </tr>

</table>

<br>

<input type="submit" name="button" value="Save">
<input type="submit" name="button" value="Cancel">

</form>

<br>
